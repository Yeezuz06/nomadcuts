{% extends "base.html" %}
{% block title %}Pedido Confirmado — NomadCuts{% endblock %}

{% block content %}
<div class="success-page">
  <div>
    <div class="success-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <span class="tag">Pedido #{{ pedido_id }}</span>
    <h2>¡Pedido recibido!</h2>
    <p>
      Gracias por tu compra. Recibirás un correo con los detalles
      del envío en las próximas horas.
    </p>
    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <a href="{{ url_for('inicio') }}" class="btn btn-outline">Volver al inicio</a>
      <a href="{{ url_for('agendar') }}" class="btn btn-primary">Agendar cita</a>
    </div>
  </div>
</div>
{% endblock %}
