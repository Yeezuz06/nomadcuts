{% extends "base.html" %}
{% block title %}Admin — NomadCuts{% endblock %}

{% block content %}
<div class="success-page">
  <div style="max-width:360px;width:100%;">
    <div style="text-align:center;margin-bottom:32px;">
      <span style="font-family:var(--font-d);font-size:28px;color:var(--gold);">NOMADCUTS</span>
      <p style="color:var(--muted);font-size:13px;margin-top:4px;">Panel de administración</p>
    </div>

    {% if error %}
    <div style="background:#1A0808;border:1px solid #5A1A1A;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;">
      <p style="color:#FF6B6B;margin:0;font-size:13px;">{{ error }}</p>
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autofocus />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:8px;">
        Entrar
      </button>
    </form>
  </div>
</div>
{% endblock %}
